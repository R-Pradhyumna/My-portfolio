<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pradhyumna R | Portfolio Update</title>
    <!-- Pulling in the Poppins font you were using previously -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Reset and basic setup */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background-color: #f9f9f9;
        color: #353535;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 2rem;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 400;
        margin-bottom: 2.5rem;
      }

      /* Button styling modeled after your dark button */
      .btn {
        display: inline-block;
        font-weight: 600;
        text-decoration: none;
        color: white;
        background-color: rgb(53, 53, 53);
        padding: 1rem 2rem;
        border-radius: 2rem;
        border: rgb(53, 53, 53) 0.1rem solid;
        transition: all 300ms ease;
      }

      .btn:hover {
        background-color: black;
        border-color: black;
        cursor: pointer;
      }

      /* Focus state for accessibility */
      .btn:focus-visible {
        outline: 3px solid rgb(53, 53, 53);
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Building something better. V2 coming soon.</h1>

    <!-- Link uses your original resume path -->

      href="./assets/R-Pradhyumna_Resume.pdf"

      class="btn"
    >
      Download Resume
    </a>
  </body>
</html>
